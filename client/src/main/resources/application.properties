quarkus.http.host-enabled=false
main-class=site.asm0dey.relay.client.ClientMain
quarkus.websockets-next.client.auto-ping-interval=30s
quarkus.websockets-next.client.connection-idle-timeout=60s
quarkus.vertx.cluster.port=0
quarkus.vertx.cluster.public-port=0

# Streaming configuration
relay.stream-threshold=1048576
relay.chunk-size=65536
relay.max-in-flight-chunks=10
relay.chunk-timeout=30s
relay.stream-timeout=5m
relay.local-app-idle-timeout=60s

quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.instances=0
quarkus.banner.enabled=false
quarkus.native.additional-build-args=--initialize-at-run-time=kotlin.uuid.SecureRandomHolder
# suppress inspection "QsProperties"
quarkus.log.category."io.quarkus".level=ERROR
