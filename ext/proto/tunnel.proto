syntax = "proto3";

package tunnel;

option java_package = "site.asm0dey.relay.domain";
option java_multiple_files = true;

// --- Messages ---

message RegisterRequest {
  string desired_subdomain = 1;
  string auth_token = 2;
}

message RegisterAck {
  bool   success = 1;
  optional string assigned_subdomain = 2;
  optional string public_url = 3;
  optional string error = 4;
}

message HttpRequest {
  string method = 2;
  string path = 3;
  map<string, string> headers = 4;
  map<string, string> query = 5;
  bool has_body = 6;
}

message HttpResponse {
  int32 status = 2;
  map<string, string> headers = 3;
  bool has_body = 4;
  optional string status_message = 5;
}

message BodyChunk {
  optional bytes  data = 2;
  bool   last = 3;
}

message WsOpen {
  string              connection_id = 1;
  map<string, string> headers = 3;
}

message WsUpgradeResponseX {
  string              connection_id = 1;
  bool                accepted = 2;
  int32               status_code = 3;
  string              subprotocol = 4;
  map<string, string> headers = 5;
}

message WsFrame {
  string connection_id = 1;
  bytes  data = 2;
  bool   is_binary = 3;
  bool   is_ping = 4;
}

message WsCloseX {
  string connection_id = 1;
  int32  code = 2;
  string reason = 3;
}

// --- Envelopes ---

message ClientMessage {
  string correlation_id = 1;
  oneof payload {
    RegisterRequest register = 3;
    HttpResponse http_response = 4;
    BodyChunk chunk = 5;
    WsUpgradeResponseX ws_upgrade = 6;
    WsFrame ws_frame = 7;
    WsCloseX ws_close = 8;
  }
}

message ServerMessage {
  string correlation_id = 1;
  oneof payload {
    RegisterAck ack = 3;
    HttpRequest http_request = 4;
    BodyChunk chunk = 5;
    WsOpen ws_open = 6;
    WsUpgradeResponseX ws_upgrade = 7;
    WsFrame ws_frame = 8;
    WsCloseX ws_close = 9;
  }
}

message PingMessage{}
message PongMessage{}

service TunnelService {
  rpc OpenTunnel (stream ClientMessage) returns (stream ServerMessage);
  rpc Ping(PingMessage) returns (PongMessage);
}
