relay:
  allowed-secret-keys:
    - secret
  domain: localhost
quarkus:
  arc:
    exclude-types:
#      - "site.asm0dey.relay.client.TunnelClient"
      - "site.asm0dey.relay.client.ClientMain"
  http:
    test-port: 9097
    port: 0
  grpc:
    server:
      enable-reflection-service: true
      use-separate-server: false
      is-plain-text-enabled: true
#      port: 9098
  log:
    category:
      "io.quarkus.grpc":
        level: DEBUG
  wiremock:
    devservices:
      files-mapping: src/test/resources
relay.websocket:
  upgrade-timeout: 2s
  max-tunnels-per-domain: 100
