quarkus.http.port=8080
main-class=site.asm0dey.relay.server.Main
quarkus.package.main-class=server
quarkus.websockets-next.server.max-frame-size=20971520
quarkus.websockets-next.server.max-message-size=20971520
quarkus.websockets-next.server.auto-ping-interval=30s
quarkus.websockets-next.client.max-frame-size=20971520
quarkus.websockets-next.client.max-message-size=20971520
relay.main-domain=domain.example.com

# Streaming configuration
relay.stream-threshold=1048576
relay.chunk-size=65536
relay.max-in-flight-chunks=10
relay.chunk-timeout=30s
relay.stream-timeout=5m
relay.local-app-idle-timeout=60s